spring:
  datasource:
    url: jdbc:mysql://localhost:3306/leasehub_db
    username: root
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernates:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  server:
    port: 8080

  application:
    name: leasehub
